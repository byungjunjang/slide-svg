<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Lecture Deck — 01 Cover (theme-parametric) -->
  <!-- Theme tokens resolved at render time from references/theme-active.json -->

  <!-- Page background -->
  <rect width="1280" height="720" fill="#FAFAF9"/>

  <!-- Accent rule (single editorial cue) -->
  <rect x="56" y="140" width="80" height="3" fill="#4633E3"/>

  <!-- Eyebrow / program label -->
  <text x="56" y="180"
        font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
        font-size="12.8" font-weight="600"
        letter-spacing="0.64"
        fill="#6B7280">
    강의 시리즈 · 01
  </text>

  <!-- Primary title (Display) -->
  <text x="56" y="340"
        font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
        font-size="56" font-weight="800"
        letter-spacing="-1.68"
        fill="#1A1A1A">
    활성 테마 셸 구성 프리뷰
  </text>

  <!-- Optional secondary line (Display-sm, accent) -->
  <text x="56" y="410"
        font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
        font-size="40" font-weight="800"
        letter-spacing="-0.8"
        fill="#4633E3">
    Shell Composition
  </text>

  <!-- Subtitle (Title) -->
  <text x="56" y="470"
        font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
        font-size="18.4" font-weight="600"
        fill="#1A1A1A">
    내러티브 셸 밴드와 콘텐츠 라이트 셸을 함께 확인
  </text>

  <!-- Presenter / date line (Body) -->
  <text x="56" y="656"
        font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif"
        font-size="15.2" font-weight="400"
        fill="#6B7280">
    장병준 · 2026
  </text>

  <!-- Thin divider at the bottom edge (structural) -->
  <line x1="56" y1="672" x2="1224" y2="672" stroke="#E5E7EB" stroke-width="1"/>
</svg>
