        </text>
        
        <rect x="20" y="50" width="24" height="12" rx="2" fill="#4633E3" opacity="0.7"/>
        <text x="55" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#6B7280">
            <tspan>产品 A</tspan>
        </text>
        
        <rect x="20" y="80" width="24" height="12" rx="2" fill="#4633E3" fill-opacity="0.6" opacity="0.6"/>
        <text x="55" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#6B7280">
            <tspan>产品 B</tspan>
