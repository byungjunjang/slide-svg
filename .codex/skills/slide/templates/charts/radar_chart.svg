        <circle cx="143" cy="77" r="6" fill="#4633E3" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="0" cy="154" r="6" fill="#4633E3" stroke="#FFFFFF" stroke-width="2"/>
