        <line x1="0" y1="0" x2="0" y2="220" stroke="#E5E7EB" stroke-width="1"/>
        <line x1="0" y1="0" x2="-190.5" y2="110" stroke="#E5E7EB" stroke-width="1"/>
        <line x1="0" y1="0" x2="-190.5" y2="-110" stroke="#E5E7EB" stroke-width="1"/>
        
        
        
        <polygon points="0,-198 162,-93.5 143,77 0,154 -152.4,88 -167.2,-96.8" 
