        <circle cx="0" cy="-165" r="6" fill="#4633E3" fill-opacity="0.6" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="171.5" cy="-99" r="6" fill="#4633E3" fill-opacity="0.6" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="162" cy="93.5" r="6" fill="#4633E3" fill-opacity="0.6" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="0" cy="176" r="6" fill="#4633E3" fill-opacity="0.6" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="-133.4" cy="77" r="6" fill="#4633E3" fill-opacity="0.6" stroke="#FFFFFF" stroke-width="2"/>
