        <circle cx="-167.2" cy="-96.8" r="6" fill="#4633E3" stroke="#FFFFFF" stroke-width="2"/>
        
        
        
        <polygon points="0,-165 171.5,-99 162,93.5 0,176 -133.4,77 -124,-71.5" 
