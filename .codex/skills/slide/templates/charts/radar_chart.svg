    </text>
    
    
    <g id="legend" transform="translate(1020, 150)">
        <rect x="0" y="0" width="200" height="120" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
        
        <text x="100" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#1A1A1A" text-anchor="middle">
